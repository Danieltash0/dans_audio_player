<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniel's Mic</title>
  <link rel="stylesheet" href="audioplay.css" />
</head>
<body>

  <div class="player">

    <h1 class="title">Audio Player</h1>

    <!-- File loader -->
    <div class="file-row">
      <label for="file-input" class="file-btn">Choose File</label>
      <input type="file" id="file-input" accept="audio/*" />
      <span id="track-name">No file loaded</span>
    </div>

    <!-- Waveform visualiser -->
    <canvas id="visualiser"></canvas>

    <!-- Time + progress bar -->
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <input type="range" id="progress" min="0" step="0.1" value="0" />
      <span id="time-dur">0:00</span>
    </div>

    <!-- Transport controls -->
    <div class="controls">
      <button id="btn-back">« 10s</button>
      <button id="btn-play">Play</button>
      <button id="btn-fwd">10s »</button>
      <button id="btn-mute">Mute</button>
      <button id="btn-loop">Loop</button>
    </div>

    <!-- Volume -->
    <div class="slider-row">
      <label>Volume</label>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" />
      <span id="vol-val">80%</span>
    </div>

    <!-- Speed -->
    <div class="slider-row">
      <label>Speed</label>
      <input type="range" id="speed" min="0.25" max="3" step="0.05" value="1" />
      <span id="speed-val">1.00</span>
    </div>

  </div>

  <script src="audioplay.js"></script>
</body>
</html>
